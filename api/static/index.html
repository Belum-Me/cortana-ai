<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#89b4fa"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Cortana"/>
  <link rel="manifest" href="/static/manifest.json"/>
  <title>Cortana</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1e1e2e;
      --surface:   #181825;
      --bubble-u:  #313244;
      --bubble-c:  #24243e;
      --accent:    #89b4fa;
      --text:      #cdd6f4;
      --subtext:   #6c7086;
      --green:     #a6e3a1;
      --red:       #f38ba8;
      --yellow:    #f9e2af;
      --border:    #45475a;
    }

    html, body {
      height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
    }

    #app {
      display: flex; flex-direction: column;
      height: 100vh; height: 100dvh;
    }

    /* Header */
    #header {
      background: var(--surface);
      padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #header h1 {
      font-size: 18px; font-weight: 700; letter-spacing: 3px;
      color: var(--accent);
    }
    #status {
      font-size: 12px; color: var(--green);
      display: flex; align-items: center; gap: 6px;
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Listening banner */
    #listening-banner {
      background: var(--accent);
      color: var(--surface);
      text-align: center;
      font-size: 13px; font-weight: 600;
      padding: 6px;
      display: none;
      flex-shrink: 0;
    }
    #listening-banner.active { display: block; }

    /* Chat */
    #chat {
      flex: 1; overflow-y: auto;
      padding: 12px 12px 4px;
      display: flex; flex-direction: column; gap: 8px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .bubble {
      max-width: 88%; padding: 10px 14px;
      border-radius: 16px; font-size: 15px;
      line-height: 1.5; word-break: break-word;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    .bubble.user {
      background: var(--bubble-u);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .bubble.cortana {
      background: var(--bubble-c);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }
    .bubble .sender {
      font-size: 11px; font-weight: 700;
      margin-bottom: 4px;
    }
    .bubble.user .sender { color: var(--subtext); }
    .bubble.cortana .sender { color: var(--accent); }

    .typing {
      background: var(--bubble-c); border: 1px solid var(--border);
      align-self: flex-start; border-radius: 16px;
      border-bottom-left-radius: 4px;
      padding: 14px 18px; display: none;
    }
    .typing.active { display: flex; gap: 5px; align-items: center; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); animation: bounce .9s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input area */
    #input-area {
      background: var(--surface);
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: flex-end;
      flex-shrink: 0;
    }
    #text-input {
      flex: 1; background: var(--bubble-u);
      border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font-size: 15px;
      padding: 10px 14px; outline: none; resize: none;
      min-height: 44px; max-height: 120px;
      font-family: inherit;
    }
    #text-input::placeholder { color: var(--subtext); }

    .icon-btn {
      width: 44px; height: 44px; border-radius: 12px;
      border: none; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0; transition: all .15s;
    }
    #send-btn {
      background: var(--accent); color: var(--surface);
    }
    #send-btn:active { transform: scale(.93); }

    /* Voice button */
    #voice-area {
      padding: 10px 12px 16px;
      background: var(--surface);
      display: flex; flex-direction: column; gap: 8px;
      flex-shrink: 0;
    }
    #voice-btn {
      width: 100%; height: 54px; border-radius: 14px;
      border: none; cursor: pointer;
      background: var(--bubble-u); color: var(--text);
      font-size: 15px; font-weight: 600; transition: all .15s;
    }
    #voice-btn.recording {
      background: var(--red); color: white;
      animation: recordPulse 1s infinite;
    }
    @keyframes recordPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(243,139,168,.5); }
      50% { box-shadow: 0 0 0 10px rgba(243,139,168,0); }
    }

    #always-on-btn {
      width: 100%; height: 42px; border-radius: 12px;
      border: 1.5px solid var(--border); cursor: pointer;
      background: transparent; color: var(--subtext);
      font-size: 13px; font-weight: 600; transition: all .2s;
    }
    #always-on-btn.active {
      background: var(--green); color: var(--surface);
      border-color: var(--green);
    }

    /* Safe area for notch phones */
    @supports (padding: env(safe-area-inset-bottom)) {
      #voice-area { padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <h1>CORTANA</h1>
    <div id="status">
      <div id="status-dot"></div>
      <span id="status-text">Activa</span>
    </div>
  </div>

  <div id="listening-banner">Di "Cortana" para activarme...</div>

  <div id="chat"></div>

  <div class="typing" id="typing">
    <span></span><span></span><span></span>
  </div>

  <div id="input-area">
    <textarea id="text-input" rows="1" placeholder="Escribe aquí..."></textarea>
    <button class="icon-btn" id="send-btn" onclick="sendText()">➤</button>
  </div>

  <div id="voice-area">
    <button id="voice-btn" ontouchstart="startVoice()" ontouchend="stopVoice()"
            onmousedown="startVoice()" onmouseup="stopVoice()">
      🎤 Mantener para hablar
    </button>
    <button id="always-on-btn" onclick="toggleAlwaysOn()">
      Escucha permanente: OFF
    </button>
  </div>

</div>

<script>
  const SERVER = window.location.origin;

  // ── Estado ──────────────────────────────────────────────────────────────────
  let alwaysOn = false;
  let alwaysOnRecognition = null;
  let isProcessing = false;

  const WAKE_WORDS = ["cortana", "oye cortana", "hey cortana", "hola cortana"];

  // ── TTS (voz de Cortana) ─────────────────────────────────────────────────────
  const synth = window.speechSynthesis;
  let cortanaVoice = null;

  function loadVoices() {
    const voices = synth.getVoices();
    // Buscar voz española femenina — preferencia: Microsoft Elvira, Google español
    cortanaVoice =
      voices.find(v => v.name.includes("Elvira")) ||
      voices.find(v => v.lang === "es-ES" && v.name.toLowerCase().includes("female")) ||
      voices.find(v => v.lang === "es-ES") ||
      voices.find(v => v.lang.startsWith("es")) ||
      null;
  }
  synth.onvoiceschanged = loadVoices;
  loadVoices();

  function speak(text) {
    if (!synth) return;
    synth.cancel();
    // Limpiar markdown
    const clean = text.replace(/\*\*(.*?)\*\*/g,"$1").replace(/\*(.*?)\*/g,"$1")
                      .replace(/`(.*?)`/g,"$1").replace(/#{1,6}\s/g,"")
                      .replace(/\n/g," ").trim();
    const utt = new SpeechSynthesisUtterance(clean);
    utt.lang = "es-ES";
    utt.rate = 0.92;
    utt.pitch = 0.88;
    utt.volume = 1.0;
    if (cortanaVoice) utt.voice = cortanaVoice;
    synth.speak(utt);
  }

  // ── UI helpers ───────────────────────────────────────────────────────────────
  function setStatus(text, color) {
    document.getElementById("status-text").textContent = text;
    document.getElementById("status-dot").style.background = color;
  }

  function addMessage(text, isUser) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "bubble " + (isUser ? "user" : "cortana");
    div.innerHTML = `<div class="sender">${isUser ? "Tú" : "Cortana"}</div>${escapeHtml(text)}`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function escapeHtml(t) {
    return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
            .replace(/\n/g,"<br>");
  }

  function showTyping(v) {
    const el = document.getElementById("typing");
    const chat = document.getElementById("chat");
    el.className = "typing" + (v ? " active" : "");
    if (v) { chat.appendChild(el); chat.scrollTop = chat.scrollHeight; }
  }

  // ── Chat ─────────────────────────────────────────────────────────────────────
  async function sendMessage(text) {
    if (!text.trim() || isProcessing) return;
    isProcessing = true;
    addMessage(text, true);
    setStatus("Pensando...", "var(--accent)");
    showTyping(true);

    try {
      const res = await fetch(`${SERVER}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });
      const data = await res.json();
      showTyping(false);
      addMessage(data.response, false);
      speak(data.response);
      setStatus(alwaysOn ? "Escuchando..." : "Activa", alwaysOn ? "var(--yellow)" : "var(--green)");
    } catch (e) {
      showTyping(false);
      addMessage("Sin conexión al servidor Cortana.", false);
      setStatus("Sin conexión", "var(--red)");
    }
    isProcessing = false;
  }

  function sendText() {
    const input = document.getElementById("text-input");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";
    input.style.height = "44px";
    sendMessage(text);
  }

  // Auto-resize textarea
  document.getElementById("text-input").addEventListener("input", function() {
    this.style.height = "44px";
    this.style.height = Math.min(this.scrollHeight, 120) + "px";
  });
  document.getElementById("text-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendText(); }
  });

  // ── Voz manual (push to talk) ─────────────────────────────────────────────────
  let voiceRecognition = null;

  function startVoice() {
    if (!("webkitSpeechRecognition" in window || "SpeechRecognition" in window)) {
      alert("Tu navegador no soporta reconocimiento de voz. Usa Chrome en Android.");
      return;
    }
    const btn = document.getElementById("voice-btn");
    btn.classList.add("recording");
    btn.textContent = "🔴 Escuchando...";
    synth.cancel();

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    voiceRecognition = new SR();
    voiceRecognition.lang = "es-ES";
    voiceRecognition.interimResults = false;
    voiceRecognition.maxAlternatives = 1;

    voiceRecognition.onresult = (e) => {
      const text = e.results[0][0].transcript;
      sendMessage(text);
    };
    voiceRecognition.onerror = () => {
      addMessage("No te escuché. Intenta de nuevo.", false);
    };
    voiceRecognition.start();
  }

  function stopVoice() {
    const btn = document.getElementById("voice-btn");
    btn.classList.remove("recording");
    btn.textContent = "🎤 Mantener para hablar";
    if (voiceRecognition) { voiceRecognition.stop(); voiceRecognition = null; }
  }

  // ── Escucha permanente (wake word) ───────────────────────────────────────────
  function toggleAlwaysOn() {
    alwaysOn ? stopAlwaysOn() : startAlwaysOn();
  }

  function startAlwaysOn() {
    if (!("webkitSpeechRecognition" in window || "SpeechRecognition" in window)) {
      alert("Tu navegador no soporta esto. Usa Chrome en Android.");
      return;
    }
    alwaysOn = true;
    document.getElementById("always-on-btn").textContent = "Escucha permanente: ON";
    document.getElementById("always-on-btn").classList.add("active");
    document.getElementById("listening-banner").classList.add("active");
    setStatus("Escuchando...", "var(--yellow)");
    runAlwaysOnLoop();
  }

  function stopAlwaysOn() {
    alwaysOn = false;
    if (alwaysOnRecognition) { alwaysOnRecognition.stop(); alwaysOnRecognition = null; }
    document.getElementById("always-on-btn").textContent = "Escucha permanente: OFF";
    document.getElementById("always-on-btn").classList.remove("active");
    document.getElementById("listening-banner").classList.remove("active");
    setStatus("Activa", "var(--green)");
  }

  function runAlwaysOnLoop() {
    if (!alwaysOn) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    alwaysOnRecognition = new SR();
    alwaysOnRecognition.lang = "es-ES";
    alwaysOnRecognition.interimResults = true;
    alwaysOnRecognition.continuous = false;

    alwaysOnRecognition.onresult = (e) => {
      let final = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript;
      }
      if (!final) return;
      const lower = final.toLowerCase();
      if (WAKE_WORDS.some(w => lower.includes(w)) && !isProcessing) {
        document.getElementById("listening-banner").textContent = `Detecté: "${final}"`;
        sendMessage(final);
      }
    };

    alwaysOnRecognition.onend = () => {
      if (alwaysOn) setTimeout(runAlwaysOnLoop, 300);
    };

    alwaysOnRecognition.onerror = (e) => {
      if (e.error !== "no-speech" && e.error !== "aborted") {
        console.warn("STT error:", e.error);
      }
      if (alwaysOn) setTimeout(runAlwaysOnLoop, 1000);
    };

    alwaysOnRecognition.start();
  }

  // ── Service Worker ────────────────────────────────────────────────────────────
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/sw.js").catch(() => {});
  }

  // ── Inicio ────────────────────────────────────────────────────────────────────
  window.addEventListener("load", () => {
    addMessage("Sistema activo. Estoy lista.", false);
    fetch(`${SERVER}/health`).then(() => {
      setStatus("Activa", "var(--green)");
    }).catch(() => {
      setStatus("Sin conexión", "var(--red)");
      addMessage("No me puedo conectar al servidor. Asegúrate de que 'python server.py' esté corriendo.", false);
    });
  });
</script>
</body>
</html>
